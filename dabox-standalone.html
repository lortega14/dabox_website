  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"es\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>dabox — Hacemos crecer el ahorro de tu gente<\u002Ftitle>\n<style>/* ---------- Fonts ---------- */\n@font-face { font-family: 'Poppins'; src: url(\"fdd0c1e0-37ef-40d1-9879-917174f90689\") format('truetype'); font-weight: 400; font-display: swap; }\n@font-face { font-family: 'Poppins'; src: url(\"03396f09-0fcc-4321-8a59-d39a88f0cd61\") format('truetype'); font-weight: 500; font-display: swap; }\n@font-face { font-family: 'Poppins'; src: url(\"39c47d69-d82e-4e4e-ae6d-8b0a5f0ee7ef\") format('truetype'); font-weight: 600; font-display: swap; }\n@font-face { font-family: 'Poppins'; src: url(\"e2523146-6785-4f1a-8f38-3fcf5507c140\") format('truetype'); font-weight: 700; font-display: swap; }\n@font-face { font-family: 'Poppins'; src: url(\"cb4412a0-c70e-4bce-8fd7-01cb033e53ec\") format('truetype'); font-weight: 800; font-display: swap; }\n@font-face { font-family: 'Poppins'; src: url(\"f83bc1ff-57da-4fc3-adef-04991b829c37\") format('truetype'); font-weight: 900; font-display: swap; }\n\n/* ---------- Brand tokens (per brandbook) ---------- */\n:root{\n  --orange:#FF5A00;\n  --orange-warm:#FF8125;\n  --orange-200:#FFEFE0;\n  --orange-300:#FFD9C0;\n  --orange-700:#CC4800;\n  --blue:#283A7F;\n  --blue-100:#E5E8F0;\n  --blue-200:#C0C7DC;\n  --blue-400:#8E9AC2;\n  --blue-500:#5C6CA8;\n  --blue-900:#1A2655;\n  --bone:#FAF9F5;\n  --text:#141413;\n  --gray-300:#E8E6DC;\n  --gray-500:#B0AEA5;\n  --success:#788C5D;\n\n  --mute:rgba(20,20,19,.62);\n  --mute-on-dark:rgba(255,255,255,.72);\n  --line:rgba(20,20,19,.08);\n  --line-strong:rgba(20,20,19,.16);\n  --line-dark:rgba(255,255,255,.10);\n\n  --radius-sm:4px;\n  --radius-md:8px;\n  --radius-lg:16px;\n  --radius-xl:24px;\n\n  --shadow-soft:0 2px 8px rgba(40,58,127,0.08);\n  --shadow-medium:0 4px 16px rgba(40,58,127,0.12);\n  --shadow-deep:0 8px 32px rgba(40,58,127,0.18);\n\n  --ease-out:cubic-bezier(0.16, 1, 0.3, 1);\n}\n\n*{box-sizing:border-box}\nhtml,body{margin:0;padding:0}\nbody{\n  font-family:'Poppins', system-ui, -apple-system, sans-serif;\n  font-weight:400;\n  color:var(--text);\n  background:var(--bone);\n  -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;\n  line-height:1.5;\n}\na{color:inherit;text-decoration:none}\nbutton{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}\nimg{max-width:100%;display:block}\nsmall{font-size:.62em;font-weight:inherit}\n\n.wrap{max-width:1240px;margin:0 auto;padding:0 24px}\nsection{position:relative}\n\n.eyebrow{\n  display:inline-flex;align-items:center;gap:8px;\n  font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;\n  color:var(--orange);\n}\n.eyebrow::before{content:\"\";width:24px;height:1px;background:var(--orange)}\n.eyebrow-light{color:var(--orange-warm)}\n\nh1,h2,h3,h4{font-weight:700;letter-spacing:-.02em;margin:0;color:var(--blue-900);text-wrap:balance}\nh1{font-size:clamp(40px, 5.6vw, 72px);font-weight:800;line-height:1.05;letter-spacing:-.03em;color:var(--blue);}\nh1 .hl{color:var(--orange)}\nh2{font-size:clamp(30px, 3.6vw, 48px);line-height:1.1;color:var(--blue);font-weight:800}\nh3{font-size:20px;line-height:1.3;font-weight:700;color:var(--blue)}\np{text-wrap:pretty}\n.lede{font-size:18px;color:var(--mute);max-width:60ch;line-height:1.55}\n\n/* ---------- Announce ---------- */\n.announce{background:var(--blue);color:white;font-size:12px;letter-spacing:.05em;font-weight:500}\n.announce-inner{display:flex;justify-content:center;align-items:center;gap:14px;height:36px;flex-wrap:wrap;text-align:center}\n.announce .sep{opacity:.35}\n\n/* ---------- Nav ---------- */\n.nav{\n  position:sticky;top:0;z-index:50;\n  backdrop-filter:saturate(1.2) blur(14px);\n  background:rgba(250,249,245,.78);\n  border-bottom:1px solid transparent;\n  transition:border-color .2s ease, background .2s ease;\n}\n.nav.scrolled{border-bottom-color:var(--gray-300);background:rgba(250,249,245,.94)}\n.nav-inner{display:flex;align-items:center;justify-content:space-between;height:72px;gap:24px}\n.brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.02em}\n.brand-mark{width:30px;height:30px}\n.brand-word{font-size:20px;color:var(--blue)}\n.nav-links{display:flex;gap:28px;align-items:center}\n.nav-links a{font-size:14px;font-weight:500;color:var(--text);opacity:.78}\n.nav-links a:hover{opacity:1;color:var(--blue)}\n\n/* ---------- Buttons ---------- */\n.btn{\n  display:inline-flex;align-items:center;justify-content:center;gap:8px;\n  padding:12px 24px;border-radius:var(--radius-md);font-weight:600;font-size:15px;\n  transition:transform .15s var(--ease-out), box-shadow .2s var(--ease-out), background .2s ease, color .2s ease, border-color .2s ease;\n  white-space:nowrap;\n}\n.btn-primary{background:var(--orange);color:white}\n.btn-primary:hover{background:var(--orange-700);transform:translateY(-1px)}\n.btn-orange{background:var(--orange);color:white}\n.btn-orange:hover{background:var(--orange-700)}\n.btn-ghost{color:var(--blue);border:1.5px solid var(--blue);background:transparent}\n.btn-ghost:hover{background:var(--blue);color:white}\n.btn-outline-light{color:white;border:1.5px solid rgba(255,255,255,.32);background:transparent}\n.btn-outline-light:hover{background:rgba(255,255,255,.08);border-color:white}\n.btn-lg{padding:16px 28px;font-size:15px}\n.btn .arr{transition:transform .2s var(--ease-out)}\n.btn:hover .arr{transform:translateX(3px)}\n\n/* ---------- Hero ---------- */\n.hero{padding:64px 0 48px;overflow:hidden;\n  background:\n    radial-gradient(900px 480px at 90% -10%, rgba(255,90,0,.08), transparent 60%),\n    radial-gradient(700px 380px at 0% 10%, rgba(40,58,127,.05), transparent 60%);\n}\n.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:64px;align-items:center}\n.hero-brand{display:flex;align-items:center;gap:12px;margin-bottom:24px}\n.hero-brand-mark{width:40px;height:40px}\n.hero-brand-word{font-size:34px;font-weight:800;letter-spacing:-.03em;color:var(--blue);line-height:1}\n.hero h1{margin-top:14px}\n.hero .lede{margin:24px 0 32px;font-size:19px}\n.hero-cta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:36px}\n.trust{display:flex;align-items:center;gap:24px;flex-wrap:wrap;color:var(--mute);font-size:13px}\n.trust strong{color:var(--blue);font-weight:600}\n.trust .dot{width:4px;height:4px;border-radius:50%;background:var(--gray-500)}\n\n/* Hero visual */\n.hero-visual{position:relative;min-height:580px;display:flex;align-items:center;justify-content:center}\n.phone{\n  width:300px;height:600px;background:var(--blue-900);\n  border-radius:42px;padding:10px;\n  box-shadow:0 30px 60px -20px rgba(40,58,127,.45), 0 8px 24px rgba(40,58,127,.18);\n  position:relative;z-index:3;\n}\n.phone-screen{\n  width:100%;height:100%;border-radius:34px;\n  background:var(--bone);\n  overflow:hidden;padding:18px 18px;display:flex;flex-direction:column;gap:14px;\n}\n.statusbar{display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:var(--text);padding:0 4px 4px}\n.sb-icons::before{content:\"●●●  ▲  ▮\"}\n.phone-head{display:flex;justify-content:space-between;align-items:center}\n.phone-greeting{font-size:12px;color:var(--mute)}\n.phone-name{font-size:16px;font-weight:700;color:var(--blue);letter-spacing:-.01em;margin-top:-2px}\n.avatar{width:36px;height:36px;border-radius:50%;background:var(--blue);color:white;display:grid;place-items:center;font-size:13px;font-weight:600}\n.balance-card{\n  background:var(--blue);color:white;border-radius:var(--radius-lg);padding:18px 18px;position:relative;overflow:hidden;\n}\n.balance-card::before{\n  content:\"\";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;\n  background:radial-gradient(circle, rgba(255,90,0,.5), transparent 70%);\n}\n.balance-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba( gap:32px}\n.metric{padding:0 24px;border-right:1px solid var(--gray-300)}\n.metric:last-child{border-right:none}\n.metric .n{font-size:48px;font-weight:800;letter-spacing:-.03em;color:var(--blue);font-variant-numeric:tabular-nums;line-height:1}\n.metric .u{font-size:13px;color:var(--orange);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-top:4px}\n.metric .l{font-size:13px;color:var(--mute);margin-top:10px;line-height:1.45}\n\n/* ---------- Section ---------- */\n.section{padding:120px 0}\n.section-head{max-width:760px;margin-bottom:64px}\n.section-head .lede{margin-top:18px}\n.section-cream{background:var(--bone)}\n.section.dark{background:var(--blue);color:white}\n.section.dark h2,.section.dark h3{color:white}\n.section.dark .lede{color:var(--mute-on-dark)}\n\n/* ---------- How it works ---------- */\n.how-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}\n.how-step{background:white;border:1px solid var(--gray-300);border-radius:var(--radius-lg);padding:32px 28px 28px;position:relative;transition:transform .2s var(--ease-out), box-shadow .2s var(--ease-out)}\n.how-step:hover{transform:translateY(-2px);box-shadow:var(--shadow-medium)}\n.hn{font-size:44px;font-weight:800;color:var(--orange);letter-spacing:-.04em;line-height:1;margin-bottom:24px;font-variant-numeric:tabular-nums}\n.how-step h3{margin-bottom:8px}\n.how-step p{font-size:14px;color:var(--mute);margin:0}\n.hs-meta{font-size:11px;color:var(--blue-500);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-top:20px;padding-top:14px;border-top:1px solid var(--gray-300)}\n\n/* ---------- Hooks ---------- */\n.hook-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}\n.hook{background:rgba(255,255,255,.04);border:1px solid var(--line-dark);border-radius:var(--radius-xl);padding:40px;position:relative}\n.hook .hk-tag{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--orange);margin-bottom:20px}\n.hook h3{font-size:32px;line-height:1.1;color:white;letter-spacing:-.025em;margin-bottom:18px;font-weight:800}\n.hk-desc{font-size:16px;color:var(--mute-on-dark);margin-bottom:24px;line-height:1.55}\n.hk-list{list-style:none;padding:0;margin:0;border-top:1px solid var(--line-dark)}\n.hk-list li{padding:14px 0 14px 28px;border-bottom:1px solid var(--line-dark);position:relative;font-size:14px;font-weight:500;color:white}\n.hk-list li::before{content:\"\";position:absolute;left:0;top:18px;width:14px;height:8px;border-left:2px solid var(--orange);border-bottom:2px solid var(--orange);transform:rotate(-45deg)}\n\n/* ---------- Yield ---------- */\n.yield-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:32px;align-items:start}\n.yield-mech{background:white;border:1px solid var(--gray-300);border-radius:var(--radius-xl);padding:32px}\n.ym-row{display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid var(--gray-300);gap:24px}\n.ym-row:last-of-type{border-bottom:none}\n.ym-step{font-size:11px;font-weight:700;color:var(--orange);letter-spacing:.12em;font-variant-numeric:tabular-nums}\n.ym-t{font-size:16px;font-weight:600;color:var(--blue);margin-top:2px}\n.ym-s{font-size:12px;color:var(--mute);margin-top:2px}\n.ym-v{font-size:24px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-.02em}\n.ym-row.sub .ym-v{color:var(--mute)}\n.ym-row.total{margin-top:8px;padding-top:24px;border-top:2px solid var(--blue);background:linear-gradient(180deg, transparent, var(--blue-100));margin-left:-32px;margin-right:-32px;padding-left:32px;padding-right:32px;padding-bottom:24px;border-radius:0 0 var(--radius-xl) var(--radius-xl)}\n.ym-row.total .ym-t{font-size:18px}\n.ym-v.hi{color:var(--orange);font-size:36px}\n.ym-foot{font-size:12px;color:var(--mute);padding:18px 32px;margin:0 -32px -32px;border-top:1px solid var(--gray-300);background:var(--bone);border-radius:0 0 var(--radius-xl) var(--radius-xl)}\n\n.yield-calc{background:var(--blue);color:white;border-radius:var(--radius-xl);padding:36px;position:sticky;top:96px}\n.yield-calc .eyebrow{color:var(--orange-warm)}\n.yield-calc .calc-h{color:white;font-size:24px;line-height:1.2;margin:14px 0 28px;font-weight:700}\n.ctrl{margin-bottom:24px}\n.ctrl-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}\n.ctrl-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.1em}\n.ctrl-value{font-size:22px;font-weight:800;color:white;font-variant-numeric:tabular-nums}\n.ctrl-value .unit{font-size:13px;color:rgba(255,255,255,.7);font-weight:500;margin-left:4px}\ninput[type=range]{-webkit-appearance:none;width:100%;height:5px;background:rgba(255,255,255,.16);border-radius:999px;outline:none}\ninput[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--orange);cursor:grab;border:3px solid white;box-shadow:0 2px 8px rgba(255,90,0,.4)}\ninput[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--orange);border:3px solid white;cursor:grab}\n.ctrl-range{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.55);margin-top:6px}\n.calc-out{margin-top:28px;padding:20px;background:rgba(255,255,255,.05);border-radius:var(--radius-md);border:1px solid rgba(255,255,255,.08)}\n.co-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;color:rgba(255,255,255,.78)}\n.co-row strong{color:white;font-weight:700;font-variant-numeric:tabular-nums}\n.co-row.hi strong{color:var(--orange-warm)}\n.co-row.total{margin-top:8px;padding-top:14px;border-top:1px solid rgba(255,255,255,.12);font-size:16px;color:white;font-weight:600}\n.co-row.total strong{font-size:22px;font-weight:800;letter-spacing:-.01em}\n.calc-note{font-size:11px;color:rgba(255,255,255,.5);margin-top:18px;line-height:1.5}\n\n/* ---------- Features ---------- */\n.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}\n.feat{background:white;border:1px solid var(--gray-300);border-radius:var(--radius-lg);padding:32px;transition:transform .2s var(--ease-out), box-shadow .2s var(--ease-out)}\n.feat:hover{transform:translateY(-2px);box-shadow:var(--shadow-medium)}\n.ft-num{font-size:13px;font-weight:700;color:var(--orange);letter-spacing:.18em;margin-bottom:18px}\n.feat h3{font-size:22px;margin-bottom:10px;color:var(--blue)}\n.feat p{font-size:15px;color:var(--mute);margin:0;line-height:1.55}\n\n/* ---------- Pricing ---------- */\n.pricing-wrap{display:grid;grid-template-columns:.8fr 1.2fr;gap:24px;align-items:start}\n.startup-card{background:var(--blue);color:white;border-radius:var(--radius-xl);padding:36px;position:relative;overflow:hidden}\n.startup-card::after{content:\"\";position:absolute;right:-60px;top:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle, rgba(255,90,0,.4), transparent 70%)}\n.sc-tag{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;background:rgba(255,255,255,.1);padding:6px 12px;border-radius:999px;color:var(--orange-warm)}\n.startup-card h3{color:white;font-size:28px;margin:18px 0 12px;font-weight:800}\n.sc-price{font-size:56px;font-weight:900;letter-spacing:-.03em;color:white;line-height:1}\n.sc-iva{font-size:14px;color:rgba(255,255,255,.6);font-weight:500;margin-left:8px;letter-spacing:0}\n.sc-list{list-style:none;padding:24px 0 0;margin:24px 0 0;border-top:1px solid rgba(255,255,255,.12);position:relative}\n.sc-list li{padding:8px 0 8px 24px;position:relative;font-size:14px;color:rgba(255,255,255,.85)}\n.sc-list li::before{content:\"\";position:absolute;left:0;top:14px;width:12px;height:6px;border-left:2px solid var(--orange);border-bottom:2px solid var(--orange);transform:rotate(-45deg)}\n\n.tier-table{background:white;border:1px solid var(--gray-300);border-radius:var(--radius-xl);padding:8px 8px 0;overflow:hidden}\n.tt-head{display:grid ow-grid\">\n      <div class=\"how-step\">\n        <div class=\"hn\">01<\u002Fdiv>\n        <h3>Firma del contrato<\u002Fh3>\n        <p>Constituimos la Asociación Civil de tu empresa con opinión legal formal. Tú firmas un solo contrato; nosotros operamos.<\u002Fp>\n        <div class=\"hs-meta\">Semana 1–4<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"how-step\">\n        <div class=\"hn\">02<\u002Fdiv>\n        <h3>Comité técnico<\u002Fh3>\n        <p>Definimos juntos las reglas: monto sugerido, tope, política de retiros, condiciones de préstamo. Queda en acta.<\u002Fp>\n        <div class=\"hs-meta\">Semana 4–8<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"how-step\">\n        <div class=\"hn\">03<\u002Fdiv>\n        <h3>Alta de colaboradores<\u002Fh3>\n        <p>Tu gente se inscribe digital. Cada quien decide cuánto aportar. Sin papeleo, sin pasar por RH.<\u002Fp>\n        <div class=\"hs-meta\">Semana 8–10<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"how-step\">\n        <div class=\"hn\">04<\u002Fdiv>\n        <h3>Descuento por nómina<\u002Fh3>\n        <p>RH carga un layout único cada periodo. Las aportaciones llegan a la AC y se invierten vía Compass.<\u002Fp>\n        <div class=\"hs-meta\">Mensual recurrente<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- DUAL HOOK -->\n<section id=\"beneficios\" class=\"section dark\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <span class=\"eyebrow\">Para quién es<\u002Fspan>\n      <h2>Dos formas de sumar dabox<br>a tu organización.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"hook-grid\">\n      <article class=\"hook\">\n        <div class=\"hk-tag\">Hook A · Para CFO / Dirección General<\u002Fdiv>\n        <h3>Moderniza tu caja<br>de ahorro interna.<\u002Fh3>\n        <p class=\"hk-desc\">¿Tu empresa ya tiene caja en Excel, con un tesorero interno? La estás cargando con riesgo legal, contable y operativo. <strong>dabox<\u002Fstrong> la convierte en un esquema profesional, auditable y digital — sin perder la cultura de ahorro que ya construiste.<\u002Fp>\n        <ul class=\"hk-list\">\n          <li>Trazabilidad y auditabilidad fiscal<\u002Fli>\n          <li>Vehículo institucional Compass en lugar de caja chica<\u002Fli>\n          <li>Rendimiento atado a CETES en lugar de cero o crédito interno<\u002Fli>\n          <li>Marco legal con AC formal y comité técnico<\u002Fli>\n        <\u002Ful>\n      <\u002Farticle>\n      <article class=\"hook\">\n        <div class=\"hk-tag\">Hook B · Para Dirección de RH<\u002Fdiv>\n        <h3>Beneficio premium,<br>sin costo para tu gente.<\u002Fh3>\n        <p class=\"hk-desc\">Súmale al paquete de beneficios un esquema que tu equipo siente mes con mes. El colaborador no paga nada. RH no administra nada. <strong>dabox<\u002Fstrong> entrega el layout, opera la caja y comunica directamente al ahorrador.<\u002Fp>\n        <ul class=\"hk-list\">\n          <li>Diferenciador real para retención y atracción<\u002Fli>\n          <li>Cero esfuerzo administrativo: layout único entregado<\u002Fli>\n          <li>Comunicación digital al colaborador, no por RH<\u002Fli>\n          <li>Educación financiera incluida<\u002Fli>\n        <\u002Ful>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- YIELD MECHANICS -->\n<section id=\"calculadora\" class=\"section section-cream\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <span class=\"eyebrow\">Mecánica de rendimiento<\u002Fspan>\n      <h2>Sin letra chiquita.<br>Tu gente ve cómo se construye su ganancia.<\u002Fh2>\n      <p class=\"lede\">El rendimiento es <strong>variable<\u002Fstrong> y atado a CETES. Esta es la mecánica completa, paso por paso. La misma que comunicamos al ahorrador.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"yield-grid\">\n      <div class=\"yield-mech\">\n        <div class=\"ym-row\">\n          <div class=\"ym-l\">\n            <div class=\"ym-step\">01<\u002Fdiv>\n            <div class=\"ym-t\">Rendimiento bruto Compass<\u002Fdiv>\n            <div class=\"ym-s\">Atado a CETES a 28 días<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ym-v\">9.50%<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ym-row sub\">\n          <div class=\"ym-l\">\n            <div class=\"ym-step\">02<\u002Fdiv>\n            <div class=\"ym-t\">Comisión Compass<\u002Fdiv>\n            <div class=\"ym-s\">Vehículo institucional<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ym-v\">– 0.60%<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ym-row sub\">\n          <div class=\"ym-l\">\n            <div class=\"ym-step\">03<\u002Fdiv>\n            <div class=\"ym-t\">Spread dabox<\u002Fdiv>\n            <div class=\"ym-s\">Operación, plataforma, soporte<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ym-v\">– 0.75%<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ym-row total\">\n          <div class=\"ym-l\">\n            <div class=\"ym-t\">Rendimiento al ahorrador<\u002Fdiv>\n            <div class=\"ym-s\">Variable, sujeto a CETES vigente<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ym-v hi\">8.15%<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ym-foot\">\n          Cifras ilustrativas con CETES a 28 días en 9.50%. <strong>El rendimiento no es garantizado<\u002Fstrong> y se ajusta con la tasa vigente.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"yield-calc\">\n        <span class=\"eyebrow\">Calculadora ilustrativa<\u002Fspan>\n        <h3 class=\"calc-h\">¿Cuánto ahorra un colaborador en 12 meses?<\u002Fh3>\n\n        <div class=\"ctrl\">\n          <div class=\"ctrl-top\">\n            <span class=\"ctrl-label\">Aportación quincenal<\u002Fspan>\n            <span class=\"ctrl-value\">$ <span id=\"vMonthly\">350<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n          <input type=\"range\" id=\"monthly\" min=\"100\" max=\"1500\" step=\"50\" value=\"350\">\n          <div class=\"ctrl-range\"><span>$100<\u002Fspan><span>$1,500<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"ctrl\">\n          <div class=\"ctrl-top\">\n            <span class=\"ctrl-label\">Plazo<\u002Fspan>\n            <span class=\"ctrl-value\"><span id=\"vYears\">1<\u002Fspan> <span class=\"unit\">año<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n          <input type=\"range\" id=\"years\" min=\"1\" max=\"5\" step=\"1\" value=\"1\">\n          <div class=\"ctrl-range\"><span>1 año<\u002Fspan><span>5 años<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"calc-out\">\n          <div class=\"co-row\">\n            <span>Aportado por el colaborador<\u002Fspan>\n            <strong id=\"bdPrincipal\">$ 8,400<\u002Fstrong>\n          <\u002Fdiv>\n          <div class=\"co-row hi\">\n            <span>Rendimiento generado<\u002Fspan>\n            <strong id=\"bdYield\">+ $ 365<\u002Fstrong>\n          <\u002Fdiv>\n          <div class=\"co-row total\">\n            <span>Saldo final estimado<\u002Fspan>\n            <strong id=\"calcResult\">$ 8,765<\u002Fstrong>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"calc-note\">Cálculo ilustrativo con rendimiento neto al ahorrador de 8.15% anual capitalizado quincenalmente. Las cifras reales dependen de CETES vigente.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOR THE COMPANY -->\n<section id=\"empresa\" class=\"section\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <span class=\"eyebrow\">Para tu empresa<\u002Fspan>\n      <h2>Un beneficio que tu RH<br>no tiene que administrar.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"feat-grid\">\n      <div class=\"feat\">\n        <div class=\"ft-num\">01<\u002Fdiv>\n        <h3>Carga cero para RH<\u002Fh3>\n        <p>Layout único estandarizado. Tu RH lo aprueba una vez al mes. Las consultas las recibe el ahorrador en su portal, no tu equipo.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"ft-num\">02<\u002Fdiv>\n        <h3>Marco legal robusto<\u002Fh3>\n        <p>Una Asociación Civil dedicada por empresa, con comité técnico, asamblea y opinión legal formal. Operación cubierta, riesgo controlado.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"ft-num\">03<\u002Fdiv>\n        <h3>Reportes mensuales<\u002Fh3>\n        <p>Visibilidad completa: número de ahorradores activos, ahorro acumulado, rendimientos pagados, retiros programados. Todo auditable.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"ft-num\">04<\u002Fdiv>\n        <h3>Diferenciador de retención<\u002Fh3>\n        <p>Las cajas de ahorro reducen rotación documentada en estudios de bienestar laboral. Súmalo al paquete de atracción y retención.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"ft-num\">05<\u002Fdiv>\n        <h3>Sin costo para colaboradores<\u002Fh3>\n        <p>La empresa paga la suscripción. El colaborador solo aporta y gana. Cero comisiones de apertura, cero manejo de cuenta.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <div class=\"ft-num\">06<\u002Fdiv>\n        <h3>Implementación 3–6 meses<\u002Fh3>\n        <p>Desde firma hasta primer descuento por nómina. Onboarding consultivo, capacitación a RH, comunicación interna a tu equipo.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PRICING -->\n<section class=\"section section-cream\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <span class=\"eyebrow\">Inversión empresarial<\u002Fspan>\n      <h2>Precio simple, escalonado por número de ahorradores.<\u002Fh2>\n      <p class=\"lede\">Un startup fee único cubre la constitución de la AC, contratos y onboarding. La suscripción mensual se ajusta al tamaño de tu plantilla.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"pricing-wrap\">\n      <div class=\"startup-card\">\n        <div class=\"sc-tag\">Cobro único<\u002Fdiv>\n        <h3>Startup fee<\u002Fh3>\n        <div class=\"sc-price\">$30,000<span class=\"sc-iva\">+ IVA<\u002Fspan><\u002Fdiv>\n        <ul class=\"sc-list\">\n          <li>Constitución de Asociación Civil<\u002Fli>\n          <li>Contratos empresa–dabox y AC–ahorrador<\u002Fli>\n          <li>Opinión legal formal<\u002Fli>\n          <li>Comité técnico y acta inicial<\u002Fli>\n          <li>Onboarding consultivo de RH<\u002Fli>\n          <li>Capacitación a tu equipo<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"tier-table\">\n        <div class=\"tt-head\">\n          <div>Suscripción mensual<\u002Fdiv>\n          <div>Ahorradores activos<\u002Fdiv>\n          <div>Costo / colaborador<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tt-row\">\n          <div class=\"tt-price\">$600<\u002Fdiv>\n          <div>10 – 30<\u002Fdiv>\n          <div class=\"tt-pp\">$20<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tt-row\">\n          <div class=\"tt-price\">$900<\u002Fdiv>\n          <div>31 – 60<\u002Fdiv>\n          <div class=\"tt-pp\">$15<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tt-row\">\n          <div class=\"tt-price\">$1,500<\u002Fdiv>\n          <div>61 – 100<\u002Fdiv>\n          <div class=\"tt-pp\">$15<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tt-row\">\n          <div class=\"tt-price\">$3,000<\u002Fdiv>\n          <div>101 – 250<\u002Fdiv>\n          <div class=\"tt-pp\">$12<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tt-row\">\n          <div class=\"tt-price\">$5,000<\u002Fdiv>\n          <div>251 – 500<\u002Fdiv>\n          <div class=\"tt-pp\">$10<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tt-row\">\n          <div class=\"tt-price\">$8,500<\u002Fdiv>\n          <div>501 – 1,000<\u002Fdiv>\n          <div class=\"tt-pp\">$8.50<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tt-row enterprise\">\n          <div class=\"tt-price\">$8,500 +<\u002Fdiv>\n          <div>1,001+ <span class=\"tt-extra\">$7 por adicional<\u002Fspan><\u002Fdiv>\n          <div class=\"tt-pp\">desde $7<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tt-foot\">Todos los precios en pesos mexicanos + IVA. La tarifa se recalcula cada mes según ahorradores activos al cierre del mes anterior.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOR THE COLLABORATOR -->\n<section id=\"colaborador\" class=\"section dark\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <span class=\"eyebrow\">Para tu gente<\u002Fspan>\n      <h2>Ahorrar sin pensarlo.<br>Mes con mes, sin complicaciones.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"coll-grid\">\n      <div class=\"coll-feat\">\n        <div class=\"cf-i\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12h4l3-9 4 18 3-9h4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Descuento automático<\u002Fh3>\n        <p>El colaborador define cuánto aportar. Su empresa lo descuenta y dabox lo hace crecer. El hábito ocurre solo.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"coll-feat\">\n        <div class=\"cf-i\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Marco legal robusto<\u002Fh3>\n        <p>Su ahorro vive en una Asociación Civil con comité técnico. El vehículo de inversión es Compass, institucional.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"coll-feat\">\n        <div class=\"cf-i\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><polyline points=\"12 6 12 12 16 14\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Retiros en julio y diciembre<\u002Fh3>\n        <p>Dos ventanas anuales alineadas a aguinaldo y vacaciones. Disciplina financiera con momentos culturales claros.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"coll-feat\">\n        <div class=\"cf-i\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2v20M5 9h14M5 15h14\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Acceso a préstamos<\u002Fh3>\n        <p>Con +12 meses de antigüedad ahorrando, acceso a créditos conjuntos caja + aliados financieros, descontados por nómina.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"coll-feat\">\n        <div class=\"cf-i\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><path d=\"M9 9h6M9 13h6M9 17h3\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Educación financiera<\u002Fh3>\n        <p>Tips, contenido y newsletters claras dentro del portal. Ahorro como primer paso, no como destino.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"coll-feat\">\n        <div class=\"cf-i\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"5\" y=\"2\" width=\"14\" height=\"20\" rx=\"2\"><\u002Frect><circle cx=\"12\" cy=\"18\" r=\"1\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Portal web responsive<\u002Fh3>\n        <p>Saldo, rendimiento y aportaciones desde cualquier celular. Sin app que descargar, sin contraseñas que olvidar.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TESTIMONIALS -->\n<section class=\"section\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <span class=\"eyebrow\">Confianza<\u002Fspan>\n      <h2>Diseñado con sindicatos,<br>cámaras y empresas mexicanas.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"logos-row\">\n      <div class=\"logo-tile\">CROM<\u002Fdiv>\n      <div class=\"logo-tile\">CANACINTRA<\u002Fdiv>\n      <div class=\"logo-tile\">COPARMEX<\u002Fdiv>\n      <div class=\"logo-tile\">AMECH<\u002Fdiv>\n      <div class=\"logo-tile\">SHRM<span class=\"lt-sub\">México<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"quotes-grid\">\n      <div class=\"quote\">\n        <p>\"Profesionalizar nuestra caja interna era una deuda histórica. Con dabox la migración fue limpia: AC formal, comité técnico, rendimiento real. Mi tesorero ya no carga el riesgo.\"<\u002Fp>\n        <div class=\"q-person\">\n          <div class=\"q-avatar\">CM<\u002Fdiv>\n          <div>\n            <div class=\"q-name\">Carlos Méndez<\u002Fdiv>\n            <div class=\"q-meta\">CFO · empresa manufacturera, Bajío<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"quote\">\n        <p>\"Sumamos dabox al paquete de beneficios sin sumar carga a mi equipo. El layout llega prearmado, las consultas las recibe el ahorrador. Para RH es transparente.\"<\u002Fp>\n        <div class=\"q-person\">\n          <div class=\"q-avatar\">MR<\u002Fdiv>\n          <div>\n            <div class=\"q-name\">María Rodríguez<\u002Fdiv>\n            <div class=\"q-meta\">Directora de RH · 180 colaboradores<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"quote\">\n        <p>\"Por primera vez veo mi ahorro crecer cada mes sin hacer nada extra. Lo descuentan, lo invierten, y en julio puedo retirar. Simple.\"<\u002Fp>\n        <div class=\"q-person\">\n          <div class=\"q-avatar\">JH<\u002Fdiv>\n          <div>\n            <div class=\"q-name\">Juan Hernández<\u002Fdiv>\n            <div class=\"q-meta\">Operario · ahorrador dabox<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FAQ -->\n<section id=\"faq\" class=\"section section-cream\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <span class=\"eyebrow\">Preguntas frecuentes<\u002Fspan>\n      <h2>Respuestas claras, sin tecnicismos.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"faq\" id=\"faqList\">\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">¿Esto está regulado por la CNBV?<span class=\"plus\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><p>dabox opera bajo figura de <strong>Asociación Civil con ahorro voluntario<\u002Fstrong>, validada con opinión legal formal. No es captación regulada CNBV porque no se promete tasa garantizada y porque cada AC es de los propios ahorradores. Compartimos el marco legal completo en la propuesta.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">¿Y si dabox quiebra, qué pasa con el ahorro?<span class=\"plus\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><p>El ahorro nunca está en dabox: vive en <strong>Compass<\u002Fstrong>, una plataforma institucional. dabox es el operador, no el custodio. Si dabox dejara de operar, los recursos siguen en Compass a nombre de la AC de tu empresa, con su comité técnico para definir el destino.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">¿Por qué pagar suscripción si Compass cobra spread?<span class=\"plus\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><p>El spread (0.75%) cubre la operación financiera. La suscripción cubre el servicio de plataforma, soporte a tu RH, comunicación al colaborador, comité técnico y mantenimiento. Son dos cosas distintas y se comunican por separado.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">¿Por qué el retiro solo es en julio y diciembre?<span class=\"plus\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><p>Para que el ahorro sea ahorro de verdad y no caja chica. Coinciden con aguinaldo y vacaciones, los momentos que culturalmente la gente espera. Esto también permite mejores rendimientos porque Compass opera con horizonte estable.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">¿No tengo ancho de banda en RH para esto.<span class=\"plus\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><p>Es exactamente al revés: dabox quita carga a RH. El layout llega prearmado, el alta es digital, las consultas las recibe directamente el ahorrador en su portal. RH solo aprueba el layout una vez al mes.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\">¿Cuánto tarda implementar dabox?<span class=\"plus\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <div class=\"faq-a\"><p>De 3 a 6 meses desde primer contacto hasta el primer descuento por nómina. Incluye descubrimiento, diseño de condiciones con comité técnico, constitución de AC, firma de contratos y comunicación interna a colaboradores.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CTA -->\n<section id=\"contacto\" class=\"section\">\n  <div class=\"wrap\">\n    <div class=\"cta\">\n      <div>\n        <span class=\"eyebrow eyebrow-light\">Siguiente paso<\u002Fspan>\n        <h2>Veinte minutos.<br>Caso aplicado a tu empresa.<\u002Fh2>\n        <p>Una llamada de descubrimiento con el equipo dabox. Salimos con un plan concreto: número estimado de ahorradores, hook adecuado para tu organización y plazo de arranque.<\u002Fp>\n        <div class=\"cta-cta\">\n          <a href=\"#\" class=\"btn btn-orange btn-lg\">Agendar demo<span class=\"arr\">→<\u002Fspan><\u002Fa>\n          <a href=\"mailto:contacto@dabox.mx\" class=\"btn btn-outline-light btn-lg\">contacto@dabox.mx<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cta-side\">\n        <div class=\"cs-row\"><span>Pipeline activo<\u002Fspan><strong>CROM · Traktolamp · +30<\u002Fstrong><\u002Fdiv>\n        <div class=\"cs-row\"><span>Empresas piloto<\u002Fspan><strong>3 cerradas en 2026<\u002Fstrong><\u002Fdiv>\n        <div class=\"cs-row\"><span>Ticket de ahorro típico<\u002Fspan><strong>$300–$800 / mes<\u002Fstrong><\u002Fdiv>\n        <div class=\"cs-row\"><span>Empresa ICP<\u002Fspan><strong>20–250 colaboradores<\u002Fstrong><\u002Fdiv>\n        <div class=\"cs-row\"><span>Foco geográfico<\u002Fspan><strong>Bajío · SLP · CDMX<\u002Fstrong><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <div class=\"wrap\">\n    <div class=\"foot-top\">\n      <div class=\"foot-brand\">\n        <img src=\"bb574a58-d71d-4e00-a36c-614217c0c0ee\" alt=\"dabox\" style=\"height:38px\">\n        <p>Caja de ahorro digital para empresas mexicanas. Hacemos crecer el ahorro de tu gente.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"foot-cols\">\n        <div class=\"foot-col\">\n          <h4>Producto<\u002Fh4>\n          <a href=\"#producto\">Cómo funciona<\u002Fa>\n          <a href=\"#calculadora\">Mecánica de rendimiento<\u002Fa>\n          <a href=\"#empresa\">Para tu empresa<\u002Fa>\n          <a href=\"#colaborador\">Para tu gente<\u002Fa>\n        <\u002Fdiv>\n        <div class=\"foot-col\">\n          <h4>Compañía<\u002Fh4>\n          <a href=\"#\">Sobre dabox<\u002Fa>\n          <a href=\"#\">Marco legal<\u002Fa>\n          <a href=\"#\">Casos de éxito<\u002Fa>\n          <a href=\"#\">Contacto<\u002Fa>\n        <\u002Fdiv>\n        <div class=\"foot-col\">\n          <h4>Recursos<\u002Fh4>\n          <a href=\"#\">Centro de ayuda<\u002Fa>\n          <a href=\"#\">Glosario<\u002Fa>\n          <a href=\"#\">Educación financiera<\u002Fa>\n          <a href=\"#faq\">FAQ<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-bottom\">\n      <div>© 2026 dabox · Hecho en México · contacto@dabox.mx<\u002Fdiv>\n      <div class=\"legal\">\n        Caja de ahorro voluntario operada bajo figura de Asociación Civil. Vehículo de inversión institucional Compass. Rendimiento variable atado a CETES — no garantizado.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- Tweaks -->\n<div class=\"tweaks\" id=\"tweaks\">\n  <h4>Tweaks<\u002Fh4>\n  <div class=\"tw-row\">\n    <label>Acento<\u002Flabel>\n    <div class=\"swatches\">\n      <button class=\"swatch active\" data-accent=\"#FF5A00\" style=\"background:#FF5A00\"><\u002Fbutton>\n      <button class=\"swatch\" data-accent=\"#FF8125\" style=\"background:#FF8125\"><\u002Fbutton>\n      <button class=\"swatch\" data-accent=\"#283A7F\" style=\"background:#283A7F\"><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tw-row\">\n    <label>Fondo<\u002Flabel>\n    <select id=\"tw-bg\">\n      <option value=\"bone\">Hueso<\u002Foption>\n      <option value=\"white\">Blanco<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"accent\": \"#FF5A00\",\n  \"bg\": \"bone\"\n}/*EDITMODE-END*/;\n\nconst nav = document.getElementById('nav');\nwindow.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 4));\n\nconst fmt = (n, dec=0) => n.toLocaleString('en-US', {minimumFractionDigits:dec, maximumFractionDigits:dec});\ndocument.querySelectorAll('[data-count]').forEach(el => {\n  const obs = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (!e.isIntersecting || el.dataset.done) return;\n      el.dataset.done = \"1\";\n      const end = parseFloat(el.dataset.count);\n      const prefix = el.dataset.prefix || '';\n      const suffix = el.dataset.suffix || '';\n      const dec = (end % 1 !== 0) ? 2 : 0;\n      const start = performance.now();\n      const dur = 1200;\n      const tick = (t) => {\n        const p = Math.min(1, (t - start) / dur);\n        const eased = 1 - Math.pow(1 - p, 3);\n        const cur = end * eased;\n        el.textContent = prefix + fmt(cur, dec) + suffix;\n        if (p < 1) requestAnimationFrame(tick);\n      };\n      requestAnimationFrame(tick);\n    });\n  }, {threshold:.4});\n  obs.observe(el);\n});\n\nlet bal = 18420.15;\nsetInterval(() => {\n  bal += Math.random() * 0.08 + 0.02;\n  const main = Math.floor(bal).toLocaleString('en-US');\n  const dec = (bal % 1).toFixed(2).slice(2);\n  document.getElementById('balanceNum').innerHTML = '$ ' + main + '.<small>' + dec + '<\u002Fsmall>';\n}, 1800);\n\n/* Calculator */\nconst fm = document.getElementById('monthly');\nconst fy = document.getElementById('years');\nconst updateCalc = () => {\n  const m = +fm.value;        // por quincena\n  const y = +fy.value;\n  const periods = y * 24;     // 24 quincenas\n  const rPer = 0.0815 / 24;\n  const fv = m * ((Math.pow(1 + rPer, periods) - 1) / rPer);\n  const principal = m * periods;\n  const yld = fv - principal;\n  document.getElementById('vMonthly').textContent = m.toLocaleString('en-US');\n  document.getElementById('vYears').textContent = y;\n  document.querySelector('#vYears + .unit').textContent = y === 1 ? 'año' : 'años';\n  document.getElementById('bdPrincipal').textContent = '$ ' + Math.round(principal).toLocaleString('en-US');\n  document.getElementById('bdYield').textContent = '+ $ ' + Math.round(yld).toLocaleString('en-US');\n  document.getElementById('calcResult').textContent = '$ ' + Math.round(fv).toLocaleString('en-US');\n  document.querySelector('.calc-h').textContent = `¿Cuánto ahorra un colaborador en ${y === 1 ? '12 meses' : y + ' años'}?`;\n};\n[fm, fy].forEach(el => el.addEventListener('input', updateCalc));\nupdateCalc();\n\ndocument.querySelectorAll('.faq-item').forEach(item => {\n  item.querySelector('.faq-q').addEventListener('click', () => item.classList.toggle('open'));\n});\ndocument.querySelector('.faq-item').classList.add('open');\n\n/* Tweaks */\nconst tweaksEl = document.getElementById('tweaks');\nlet state = {...TWEAK_DEFAULTS};\nfunction applyTweaks(){\n  document.documentElement.style.setProperty('--orange', state.accent);\n  document.body.style.background = state.bg === 'white' ? '#FFFFFF' : '';\n  document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s.dataset.accent === state.accent));\n  document.getElementById('tw-bg').value = state.bg;\n}\ndocument.querySelectorAll('.swatch').forEach(s => s.addEventListener('click', () => {\n  state.accent = s.dataset.accent; applyTweaks();\n  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{accent:state.accent}}, '*');\n}));\ndocument.getElementById('tw-bg').addEventListener('change', e => {\n  state.bg = e.target.value; applyTweaks();\n  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{bg:state.bg}}, '*');\n});\napplyTweaks();\n\nwindow.addEventListener('message', (e) => {\n  if (!e.data || !e.data.type) return;\n  if (e.data.type === '__activate_edit_mode') tweaksEl.classList.add('show');\n  if (e.data.type === '__deactivate_edit_mode') tweaksEl.classList.remove('show');\n});\nwindow.parent.postMessage({type:'__edit_mode_available'}, '*');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
